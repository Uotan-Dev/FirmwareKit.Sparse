name: Publish AOT

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Publish version'
        required: true
        default: '1.0.0'

jobs:
  publish:
    name: Publish for ${{ matrix.os }} (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: .exe
          - os: windows-latest
            rid: win-x86
            ext: .exe
          - os: ubuntu-latest
            rid: linux-x64
            ext: ""
          - os: macos-latest
            rid: osx-x64
            ext: ""
          - os: macos-latest
            rid: osx-arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' 

      - name: Publish AOT
        run: |
          dotnet publish FastbootCLI/FastbootCLI.csproj -c Release -r ${{ matrix.rid }} -p:PublishAot=true -p:OptimizationPreference=Size -o ./publish/${{ matrix.rid }}

      - name: Zip Artifacts
        shell: pwsh
        run: |
          $publishDir = "./publish/${{ matrix.rid }}"
          $zipPath = "fastboot-${{ matrix.rid }}.zip"
          Compress-Archive -Path "$publishDir\*" -DestinationPath $zipPath

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastboot-${{ matrix.rid }}
          path: fastboot-${{ matrix.rid }}.zip

  release:
    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: ./artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
